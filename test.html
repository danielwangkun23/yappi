<!DOCTYPE html>
<html>
<head>
<style>
.pd{width:14px;height:14px;border-radius:50%;border:2px solid #E0D6F5;transition:all .2s;display:inline-block;margin:5px}
.pd.on{background:#9B6BFF;border-color:#9B6BFF}
</style>
</head>
<body>
<div id="r-dots">
  <div class="pd"></div>
  <div class="pd"></div>
  <div class="pd"></div>
  <div class="pd"></div>
</div>
<br>
<button onclick="testPin()">测试输入PIN</button>

<script>
let rPin = '';

function pp(ctx,d){
  const ref=ctx==='l'?'lPin':'rPin';
  console.log('Before:', window[ref], 'length:', window[ref].length);
  if(window[ref].length>4)return;
  window[ref]+=d;
  console.log('After:', window[ref], 'length:', window[ref].length);
  updDots(ctx+'-dots',window[ref].length);
}

function updDots(id,n,err=false){
  console.log('updDots called with id:', id, 'n:', n);
  document.querySelectorAll('#'+id+' .pd').forEach((d,i)=>{
    d.classList.toggle('on',i<n&&!err);
    console.log('Dot', i, 'on:', i<n&&!err);
  });
}

function testPin(){
  pp('r','1');
  pp('r','2');
  pp('r','3');
  pp('r','4');
}
</script>
</body>
</html>
