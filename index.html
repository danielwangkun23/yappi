<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Yappi ⭐ 小勇士成长记</title>
  <meta name="description" content="Yappi - Every day, a little brighter!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF8C42; --pink: #FF6B9D; --purple: #9B6BFF;
      --green: #6BCB77; --bg: #FFF8F0; --card: #FFFFFF;
      --text: #3D2C4E; --muted: #9B8FAE;
      --shadow: 0 4px 20px rgba(155,107,255,0.10);
    }
    html, body { font-family: 'Nunito', sans-serif; background: #EDE0FF; min-height: 100vh; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(155,107,255,0.18); }
    .pages { flex: 1; overflow-y: auto; }
    .page { display: none; padding-bottom: 90px; }
    .page.active { display: block; }

    .home-header { background: linear-gradient(135deg,#9B6BFF 0%,#C77DFF 55%,#FF6B9D 100%); padding: 48px 22px 30px; border-radius: 0 0 36px 36px; position: relative; overflow: hidden; }
    .home-header::before { content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; background:rgba(255,255,255,.10); border-radius:50%; }
    .yappi-logo { font-size:12px; font-weight:900; color:rgba(255,255,255,0.6); letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
    .greeting { color:rgba(255,255,255,.85); font-size:14px; font-weight:600; margin-bottom:3px; }
    .child-name { color:white; font-size:28px; font-weight:900; margin-bottom:18px; }
    .star-badge { background:rgba(255,255,255,.18); border-radius:22px; padding:14px 22px; display:inline-flex; align-items:center; gap:14px; border:1px solid rgba(255,255,255,.28); }
    .star-count { color:white; font-size:32px; font-weight:900; line-height:1; }
    .star-meta { display:flex; flex-direction:column; gap:1px; }
    .star-label { color:rgba(255,255,255,.75); font-size:12px; font-weight:700; }
    .star-sublabel { color:rgba(255,255,255,.5); font-size:11px; font-weight:600; }
    .level-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.22); border-radius:20px; padding:7px 16px; color:white; font-size:13px; font-weight:800; margin-top:14px; border:1px solid rgba(255,255,255,.2); }

    .section-title { font-size:17px; font-weight:800; color:var(--text); padding:22px 22px 12px; }
    .streak-row { display:flex; gap:8px; padding:0 22px; overflow-x:auto; scrollbar-width:none; }
    .streak-row::-webkit-scrollbar { display:none; }
    .streak-day { flex-shrink:0; width:44px; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .streak-dot { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; background:#EDE8F8; }
    .streak-dot.done { background:linear-gradient(135deg,#FFD700,#FF8C42); }
    .streak-dot.today { background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:0 4px 14px rgba(155,107,255,.45); }
    .streak-day-label { font-size:11px; font-weight:700; color:var(--muted); }

    .task-list { padding:0 22px; display:flex; flex-direction:column; gap:13px; }
    .task-card { background:var(--card); border-radius:22px; padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow); border:2px solid transparent; cursor:pointer; transition:all .22s; -webkit-tap-highlight-color:transparent; }
    .task-card.done { background:linear-gradient(135deg,#F0FFF4,#E8F8FF); border-color:#6BCB77; }
    .task-card:active { transform:scale(.97); }
    .task-emoji-wrap { width:54px; height:54px; border-radius:17px; display:flex; align-items:center; justify-content:center; font-size:27px; flex-shrink:0; }
    .task-info { flex:1; min-width:0; }
    .task-name { font-size:16px; font-weight:800; color:var(--text); }
    .task-desc { font-size:12px; font-weight:600; color:var(--muted); margin-top:2px; }
    .task-stars { font-size:13px; font-weight:800; color:var(--orange); margin-top:5px; }
    .task-check { width:34px; height:34px; border-radius:50%; border:2.5px solid #E0D6F5; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; color:transparent; transition:all .3s; }
    .task-card.done .task-check { background:var(--green); border-color:var(--green); color:white; }

    .modal-overlay { position:fixed; inset:0; background:rgba(61,44,78,.55); backdrop-filter:blur(4px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .3s; }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal { background:white; border-radius:28px; padding:28px 24px; width:100%; max-width:340px; text-align:center; transform:scale(.9) translateY(20px); transition:transform .3s; }
    .modal-overlay.show .modal { transform:scale(1) translateY(0); }
    .modal-emoji { font-size:54px; margin-bottom:12px; display:block; }
    .modal-task { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:10px; }
    .modal-praise { font-size:17px; font-weight:800; color:var(--text); line-height:1.6; min-height:64px; display:flex; align-items:center; justify-content:center; }
    .modal-stars { display:inline-flex; align-items:center; gap:6px; background:#FFF3CD; border-radius:20px; padding:8px 18px; font-size:15px; font-weight:800; color:#8B6914; margin:16px 0; }
    .modal-btn { width:100%; background:linear-gradient(135deg,var(--purple),var(--pink)); color:white; border:none; border-radius:16px; padding:15px; font-size:16px; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; }
    .modal-btn:active { transform:scale(.97); }
    .dot-pulse { display:flex; gap:5px; align-items:center; justify-content:center; }
    .dot-pulse span { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--purple); animation:pulse 1.2s ease-in-out infinite; }
    .dot-pulse span:nth-child(2) { animation-delay:.2s; }
    .dot-pulse span:nth-child(3) { animation-delay:.4s; }
    @keyframes pulse { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }

    .stars-bar { background:linear-gradient(135deg,var(--orange),#FFD700); margin:0 22px 20px; border-radius:18px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; color:white; }
    .stars-bar-label { font-size:13px; font-weight:700; opacity:.85; }
    .stars-bar-count { font-size:26px; font-weight:900; }
    .shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 22px; }
    .shop-card { background:white; border-radius:22px; padding:18px 12px; text-align:center; box-shadow:var(--shadow); cursor:pointer; transition:all .2s; border:2px solid transparent; -webkit-tap-highlight-color:transparent; }
    .shop-card:active { transform:scale(.96); }
    .shop-card.redeemed { border-color:var(--green); background:#F0FFF4; }
    .shop-emoji { font-size:38px; margin-bottom:9px; display:block; }
    .shop-name { font-size:14px; font-weight:800; color:var(--text); margin-bottom:8px; }
    .shop-cost { display:inline-flex; align-items:center; gap:4px; background:#FFF3CD; border-radius:20px; padding:4px 12px; font-size:13px; font-weight:800; color:#8B6914; }
    .shop-cost.cant { background:#F5F0FF; color:var(--muted); }

    .medals-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 22px; }
    .medal-card { background:white; border-radius:22px; padding:20px 12px; text-align:center; box-shadow:var(--shadow); }
    .medal-card.locked { opacity:.4; filter:grayscale(.7); }
    .medal-emoji { font-size:42px; margin-bottom:9px; display:block; }
    .medal-name { font-size:13px; font-weight:800; color:var(--text); }
    .medal-desc { font-size:11px; font-weight:600; color:var(--muted); margin-top:3px; }
    .medal-progress { height:5px; background:#F0E8FF; border-radius:10px; margin-top:10px; overflow:hidden; }
    .medal-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,var(--purple),var(--pink)); }

    .parent-card { background:white; border-radius:22px; margin:0 22px 14px; padding:20px; box-shadow:var(--shadow); }
    .parent-card-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:14px; }
    .parent-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid #F5F0FF; font-size:14px; }
    .parent-row:last-child { border-bottom:none; }
    .parent-row-label { font-weight:700; color:var(--text); }
    .parent-row-val { font-weight:600; color:var(--muted); }
    .toggle { width:46px; height:27px; border-radius:14px; background:var(--purple); position:relative; cursor:pointer; transition:background .3s; flex-shrink:0; }
    .toggle::after { content:''; position:absolute; width:21px; height:21px; background:white; border-radius:50%; top:3px; left:22px; transition:left .3s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
    .toggle.off { background:#E0D6F5; }
    .toggle.off::after { left:3px; }
    .add-btn { display:block; width:calc(100% - 44px); margin:4px 22px 0; background:linear-gradient(135deg,var(--purple),var(--pink)); color:white; border:none; border-radius:18px; padding:16px; font-size:16px; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; }
    .add-btn:active { transform:scale(.97); }

    .nav { position:sticky; bottom:0; width:100%; background:white; border-top:1.5px solid #F0E8FF; display:flex; padding:8px 0 14px; z-index:100; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; -webkit-tap-highlight-color:transparent; }
    .nav-icon { width:30px; height:30px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; transition:background .2s; }
    .nav-item.active .nav-icon { background:#F0E8FF; }
    .nav-label { font-size:11px; font-weight:700; color:var(--muted); }
    .nav-item.active .nav-label { color:var(--purple); }

    .burst { position:fixed; pointer-events:none; z-index:999; font-size:26px; animation:burstAnim .9s ease-out forwards; }
    @keyframes burstAnim { 0%{transform:scale(0) translateY(0);opacity:1} 100%{transform:scale(1.6) translateY(-90px);opacity:0} }

    .toast { position:fixed; bottom:95px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:12px 26px; border-radius:30px; font-size:14px; font-weight:700; z-index:400; opacity:0; transition:opacity .3s; white-space:nowrap; pointer-events:none; max-width:88vw; text-align:center; }
    .toast.show { opacity:1; }

    .loading-screen { position:fixed; inset:0; background:linear-gradient(135deg,#9B6BFF,#FF6B9D); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition:opacity .5s; }
    .loading-screen.hide { opacity:0; pointer-events:none; }
    .loading-logo { font-size:52px; margin-bottom:12px; animation:bounce 1s ease-in-out infinite; }
    .loading-title { color:white; font-size:30px; font-weight:900; letter-spacing:3px; }
    .loading-sub { color:rgba(255,255,255,.7); font-size:14px; font-weight:600; margin-top:8px; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  </style>
</head>
<body>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtdXpsdGFlYnV4aG1qemFkdWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTAzNTUsImV4cCI6MjA5Mjk4NjM1NX0.r6T-mhBYLGQS-lM0TmGhSRUZhfnh14eyPkcMfNMUzm8';

const TASKS = [

const REWARDS = [
  { id:'r1', name:'看动画片', emoji:'📺', cost:20 },
  { id:'r2', name:'吃冰淇淋', emoji:'🍦', cost:30 },
  { id:'r3', name:'去公园玩', emoji:'🏞️', cost:50 },
  { id:'r4', name:'买新玩具', emoji:'🎮', cost:80 },

  { id:'m1', name:'第一步',   desc:'完成第1个任务',    emoji:'🌟', threshold:1,   stat:'totalTasks' },
  { id:'m2', name:'连续达人', desc:'连续3天打卡',      emoji:'🔥', threshold:3,   stat:'streak' },
  { id:'m3', name:'超级英雄', desc:'连续7天打卡',      emoji:'🦸', threshold:7,   stat:'streak' },
  { id:'m4', name:'阅读达人', desc:'阅读任务完成7次',  emoji:'📚', threshold:7,   stat:'readCount' },
  { id:'m5', name:'运动健将', desc:'运动任务完成10次', emoji:'💪', threshold:10,  stat:'sportCount' },

];

const LEVELS = [
  { min:0,   label:'🐣 星星萌新' },
  { min:20,  label:'🌱 成长新芽' },
  { min:50,  label:'🦋 蝴蝶小勇士' },
  { min:100, label:'🌟 闪耀小英雄' },
  { min:200, label:'🚀 超级小达人' },
  { min:400, label:'👑 传说小冠军' },
];

const DAYS_CN = ['周日','周一','周二','周三','周四','周五','周六'];

let child = null;
let todayLogs = new Set();
let redemptions = new Set();
let taskCounts = {};

const todayStr = () => new Date().toISOString().slice(0,10);
const getLevel = (s) => [...LEVELS].reverse().find(l => s >= l.min) || LEVELS[0];
const getGreeting = () => {
  const h = new Date().getHours();
  if (h < 6) return '夜深了，好好休息！';
  if (h < 11) return '早上好！';
  if (h < 14) return '中午好！';
  if (h < 18) return '下午好！';
  return '晚上好！';
};

async function loadData() {
  let { data: rows } = await db.from('children').select('*').limit(1);
  if (!rows || rows.length === 0) {
    const { data: nc } = await db.from('children').insert({ name:'小宝贝', stars:0, total_stars:0, streak:0 }).select().single();
    child = nc;
  } else {
    child = rows[0];
  }

  const { data: logs } = await db.from('task_logs').select('task_id').eq('child_id', child.id).eq('done_date', todayStr());
  todayLogs = new Set((logs||[]).map(l => l.task_id));

  const { data: reds } = await db.from('redemptions').select('reward_id').eq('child_id', child.id);
  redemptions = new Set((reds||[]).map(r => r.reward_id));

  const { data: allLogs } = await db.from('task_logs').select('task_id').eq('child_id', child.id);
  taskCounts = {};
  (allLogs||[]).forEach(l => { taskCounts[l.task_id] = (taskCounts[l.task_id]||0) + 1; });
}

async function completeTask(task) {
  if (todayLogs.has(task.id)) return;
  todayLogs.add(task.id);
  await db.from('task_logs').insert({ child_id:child.id, task_id:task.id, task_name:task.name, stars_earned:task.stars, done_date:todayStr() });
  child.stars += task.stars;
  child.total_stars += task.stars;
  await db.from('children').update({ stars:child.stars, total_stars:child.total_stars, last_checkin_date:todayStr() }).eq('id', child.id);
  taskCounts[task.id] = (taskCounts[task.id]||0) + 1;
  updateUI();
}

async function redeemReward(reward) {
  if (child.stars < reward.cost) { showToast('星星不够哦，继续加油！💪'); return; }
  if (redemptions.has(reward.id)) { showToast('今天已经兑换过啦！'); return; }
  redemptions.add(reward.id);
  await db.from('redemptions').insert({ child_id:child.id, reward_id:reward.id, reward_name:reward.name, stars_cost:reward.cost });
  child.stars -= reward.cost;
  await db.from('children').update({ stars:child.stars }).eq('id', child.id);
  updateUI();
  showToast('成功兑换：' + reward.name + ' 🎉');
}

async function getAIPraise(taskName, stars) {
  if (ANTHROPIC_KEY === 'YOUR_ANTHROPIC_KEY_HERE') return fallbackPraise(taskName);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':ANTHROPIC_KEY, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{ role:'user', content:`你是一个超级温暖的儿童鼓励小精灵。孩子完成了"${taskName}"，获得${stars}颗星星。用1-2句话夸奖他/她，语气活泼可爱，适合3-12岁孩子，可加emoji，不超过40字。只输出鼓励语。` }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || fallbackPraise(taskName);
  } catch(e) { return fallbackPraise(taskName); }
}

function fallbackPraise(name) {
  const list = [
    `完成"${name}"，你真的超级棒！⭐`,
    `太厉害了！小英雄又完成任务啦！🚀`,
    `你做到了！妈妈爸爸一定超级开心！🎉`,
    `棒棒哒！你今天又进步啦！🌟`,
    `哇哦！为你鼓掌！继续加油！👏`,
  ];
  return list[Math.floor(Math.random() * list.length)];
}

function updateUI() {
  if (!child) return;
  document.getElementById('star-display').textContent = child.stars;
  document.getElementById('total-label').textContent = '累计 ' + child.total_stars + ' 颗';
  document.getElementById('shop-star-display').textContent = '⭐ ' + child.stars;
  document.getElementById('level-pill').textContent = getLevel(child.total_stars).label;
  document.getElementById('greeting').textContent = getGreeting();
  document.getElementById('p-stars').textContent = child.stars + ' ⭐';
  document.getElementById('p-total').textContent = child.total_stars + ' ⭐';
  document.getElementById('p-streak').textContent = (child.streak||0) + ' 天 🔥';
  document.getElementById('p-today').textContent = todayLogs.size + ' / ' + TASKS.length;
  renderStreak(); renderTasks(); renderShop(); renderMedals();
}

function renderStreak() {
  const row = document.getElementById('streak-row');
  const today = new Date();
  row.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const isToday = i === 0;
    const cls = isToday ? 'today' : (i <= (child.streak||0) && i > 0 ? 'done' : '');
    row.innerHTML += `<div class="streak-day"><div class="streak-dot ${cls}">${isToday?'✨':(cls==='done'?'⭐':'')}</div><div class="streak-day-label">${isToday?'今天':DAYS_CN[d.getDay()]}</div></div>`;
  }
}

function renderTasks() {
  document.getElementById('task-list').innerHTML = TASKS.map(t => {
    const done = todayLogs.has(t.id);
    return `<div class="task-card ${done?'done':''}" onclick="handleTask('${t.id}')">
      <div class="task-emoji-wrap" style="background:${t.bg}">${t.emoji}</div>
      <div class="task-info"><div class="task-name">${t.name}</div><div class="task-desc">${t.desc}</div><div class="task-stars">⭐ +${t.stars} 星星</div></div>
      <div class="task-check">${done?'✓':''}</div></div>`;
  }).join('');
}

function renderShop() {
  document.getElementById('shop-grid').innerHTML = REWARDS.map(r => {
    const red = redemptions.has(r.id);
    const cant = child.stars < r.cost && !red;
    return `<div class="shop-card ${red?'redeemed':''}" onclick="handleRedeem('${r.id}')">
      <span class="shop-emoji">${r.emoji}</span><div class="shop-name">${r.name}</div>
      <div class="shop-cost ${cant?'cant':''}">${red?'✓ 已兑换':'⭐ '+r.cost}</div></div>`;
  }).join('');
}

function renderMedals() {
  const stats = {
    totalTasks: Object.values(taskCounts).reduce((a,b)=>a+b,0),
    streak: child.streak||0, totalStars: child.total_stars||0,
    readCount: taskCounts['t2']||0, sportCount: taskCounts['t5']||0,
  };
  document.getElementById('medals-grid').innerHTML = MEDALS.map(m => {
    const val = Math.min(stats[m.stat]||0, m.threshold);
    const pct = Math.round(val/m.threshold*100);
    const unlocked = val >= m.threshold;
    return `<div class="medal-card ${unlocked?'':'locked'}">
      <span class="medal-emoji">${m.emoji}</span>
      <div class="medal-name">${m.name}</div><div class="medal-desc">${m.desc}</div>
      <div class="medal-progress"><div class="medal-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

async function handleTask(tid) {
  const task = TASKS.find(t => t.id === tid);
  if (!task || todayLogs.has(tid)) return;
  await completeTask(task);
  spawnBurst();
  showAIModal(task);
}

function handleRedeem(rid) {
  const reward = REWARDS.find(r => r.id === rid);
  if (reward) redeemReward(reward);
}

async function showAIModal(task) {
  document.getElementById('modal-emoji').textContent = task.emoji;
  document.getElementById('modal-task').textContent = '完成任务：' + task.name;
  document.getElementById('modal-stars').textContent = '⭐ +' + task.stars + ' 颗星星';
  document.getElementById('modal-praise').innerHTML = '<div class="dot-pulse"><span></span><span></span><span></span></div>';
  document.getElementById('modal-overlay').classList.add('show');
  const praise = await getAIPraise(task.name, task.stars);
  document.getElementById('modal-praise').textContent = praise;
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function switchPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  document.querySelector('.pages').scrollTop = 0;
}

function spawnBurst() {
  ['⭐','✨','🌟','💫','🎉'].forEach((e,i) => {
    const b = document.createElement('div'); b.className='burst'; b.textContent=e;
    b.style.left=(15+Math.random()*70)+'vw'; b.style.top=(25+Math.random()*35)+'vh';
    b.style.animationDelay=(i*.12)+'s';
    document.body.appendChild(b); setTimeout(()=>b.remove(),1200);
  });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'),2800);
}

async function init() {
  try {
    await loadData();
    updateUI();
  } catch(e) {
    console.error(e);
    showToast('网络连接失败，请刷新重试 🔄');
  }
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    ls.classList.add('hide');
    setTimeout(()=>ls.remove(), 500);
  }, 1200);
}

init();
</script>
</body>
</html>
